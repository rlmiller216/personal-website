<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Signature — Rebecca L Miller, PhD</title>
  <!--
    HOW TO USE:
    1. Open this file in your browser (Chrome recommended)
    2. Press Ctrl+A (Cmd+A on Mac) to select all
    3. Press Ctrl+C (Cmd+C on Mac) to copy
    4. Go to Gmail → Settings → General → Signature
    5. Paste into the signature editor (Ctrl+V / Cmd+V)
    6. Save changes

    Note: Icons must be live at rlmiller.netlify.app/icons/ for them
    to display in emails. Deploy the site first.
  -->
</head>
<body style="margin:0;padding:20px;background:#f6f5f4;font-family:Arial,Helvetica,sans-serif;">

<table cellpadding="0" cellspacing="0" border="0" style="max-width:400px;font-family:Arial,Helvetica,sans-serif;">
  <!-- Name -->
  <tr>
    <td style="font-family:Georgia,'Times New Roman',serif;font-size:18px;font-weight:bold;color:#1D2440;line-height:1.2;padding:0;">
      Rebecca L Miller, PhD
    </td>
  </tr>
  <!-- Title -->
  <tr>
    <td style="font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#1D2440;line-height:1.3;padding:3px 0 0 0;">
      Biophysicist &#124; Science for Good
    </td>
  </tr>
  <!-- Neon Chartreuse divider -->
  <tr>
    <td style="padding:10px 0 8px 0;">
      <div style="height:3px;width:60px;background-color:#eeff5d;"></div>
    </td>
  </tr>
  <!-- Icon links -->
  <tr>
    <td style="padding:0;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <!-- Globe → Website -->
          <td style="padding:0 10px 0 0;">
            <a href="https://rlmiller.netlify.app" target="_blank" style="text-decoration:none;">
              <img src="https://rlmiller.netlify.app/icons/globe.png" alt="Website" width="18" height="18" style="display:block;border:0;outline:none;" />
            </a>
          </td>
          <!-- LinkedIn -->
          <td style="padding:0;">
            <a href="https://www.linkedin.com/in/rebeccalauriemiller/" target="_blank" style="text-decoration:none;">
              <img src="https://rlmiller.netlify.app/icons/linkedin.png" alt="LinkedIn" width="18" height="18" style="display:block;border:0;outline:none;" />
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

</body>
</html>
